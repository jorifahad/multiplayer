<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Zombie Strike</title>
<style>
    :root,
    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background-color: black;
      font-family: 'Segoe UI', sans-serif;
    }

    #container {
      position: absolute;
      inset: 0;
      z-index: 0;
    }

    #subtitle-box {
      position: fixed;
      bottom: 7%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 40, 30, 0.72);
      color: #3cff3c;
      padding: 1.2rem 2rem;
      border-radius: 12px;
      font-size: 1.25rem;
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.67);
      z-index: 1000;
      text-align: center;
      pointer-events: none;
      max-width: 80vw;
      display: none;
    }

    #start-screen {
      position: absolute;
      inset: 0;
      background: url("/image.webp") center / cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 2rem;
      color: #00f0ff;
      text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
      animation: fadeIn 1s ease-out;
      box-sizing: border-box;
    }

    #start-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      max-width: 800px;
      width: 100%;
      padding: 2rem;
      border-radius: 16px;
      box-shadow: 0 0 20px #00f0ff55;
      background: rgba(0, 0, 0, 0.4);
    }

    #title {
      font-size: 3.5rem;
      animation: glow 2s infinite alternate;
      text-align: center;
    }

    #start-button {
      padding: 1rem 2.5rem;
      font-size: 1.5rem;
      color: white;
      background: #00f0ff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
      transition: transform 0.2s, background 0.3s;
    }

    #start-button:hover {
      transform: scale(1.05);
      background: #00cce0;
    }
#loading-screen {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10, 10, 20, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 100;
    }

    #loading-text {
      color: #fff;
      font-size: 3rem;
      margin-bottom: 2rem;
      letter-spacing: 0.2em;
      text-shadow: 0 0 20px #00f0ff;
      animation: glow 2s infinite alternate;
    }

    #loading-bar-bg {
      width: 250px;
      height: 20px;
      background: #111;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 1rem;
      box-shadow: 0 0 10px #00f0ff44;
    }

    #loading-bar {
      width: 0;
      height: 100%;
      background: linear-gradient(90deg, #00f0ff, #00cce0);
      transition: width 0.3s;
    }

    .mission-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 3rem;
      font-family: monospace;
      font-weight: bold;
      padding: 2rem;
      background-color: rgba(0, 0, 0, 0.85);
      z-index: 2000;
    }

    .mission-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
    }

    #mission-complete-overlay {
      color: #3cff3c;
      display: none;
    }

    #mission-failed-overlay {
      color: #ff3c3c;
      display: none;
    }

    .mission-link {
      padding: 14px 32px;
      background: #24292f;
      color: #fff;
      border-radius: 8px;
      font-size: 1.2rem;
      font-family: monospace;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 2px 12px #000a;
      transition: background 0.2s, transform 0.2s;
    }

    .mission-link:hover {
      background: #57606a;
      transform: scale(1.05);
    }

    @keyframes glow {
      from {
        text-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff;
      }

      to {
        text-shadow: 0 0 20px #00f0ff, 0 0 40px #00f0ff;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    #notification {
      position: fixed;
      bottom: 10%;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(30, 40, 30, 0.72);
      color: #3cff3c;
      padding: 1rem 2rem;
      border-radius: 12px;
      font-size: 1.25rem;
      font-family: monospace;
      font-weight: bold;
      letter-spacing: 0.02em;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.67);
      z-index: 1000;
      text-align: center;
      display: none;
      /* Initially hidden */
    }
  </style>
</head>

<body>
  <div id="start-screen">
    <div id="start-content">
      <h1 id="title">⚡ ZOMBIE STRIKE ⚡</h1>
      <button id="start-button" aria-label="Start the game">Start Game</button>
      <div id="notification">Press ESC to exit fullscreen</div>
    </div>
  </div>

  <div id="loading-screen">
    <div id="loading-text">LOADING</div>
    <div id="loading-bar-bg">
      <div id="loading-bar"></div>
    </div>
  </div>

  <div id="container"></div>
  <div id="subtitle-box"></div>

  <div id="mission-complete-overlay" class="mission-overlay">
    <div class="mission-content">
      <div>Mission Complete!</div>
    </div>
  </div>

  <div id="mission-failed-overlay" class="mission-overlay">
    <div class="mission-content">
      <div>Mission Failed!</div>
    </div>
  </div>

  <script type="module" src="/main.ts"></script>
  <script>
    const startButton = document.getElementById('start-button');
    const notification = document.getElementById('notification');
    startButton.addEventListener('click', () => {
      // Request fullscreen
      if (document.documentElement.requestFullscreen) {
        document.documentElement.requestFullscreen();
      } else if (document.documentElement.mozRequestFullScreen) { // Firefox
        document.documentElement.mozRequestFullScreen();
      } else if (document.documentElement.webkitRequestFullscreen) { // Chrome, Safari and Opera
        document.documentElement.webkitRequestFullscreen();
      } else if (document.documentElement.msRequestFullscreen) { // IE/Edge
        document.documentElement.msRequestFullscreen();
      }
      // Show notification
      notification.style.display = 'block';
    });
    // Optional: Hide notification when exiting fullscreen
    document.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) {
        notification.style.display = 'none';
      }
    });
  </script>
</body>

</html>
